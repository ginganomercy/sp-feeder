version: '3.8'

services:
  # Flask Application — image pulled from GHCR by CI/CD
  web:
    image: ${GHCR_IMAGE:-smart-pet-feeder:latest}
    container_name: smart-pet-feeder-web
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=False
      - MYSQL_HOST=db
      - MQTT_BROKER=mosquitto
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_started
    networks:
      - petfeeder-network
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: smart-pet-feeder-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - petfeeder-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Mosquitto MQTT Broker (Private)
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: smart-pet-feeder-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker/mosquitto/config:/mosquitto/config:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-logs:/mosquitto/log
    networks:
      - petfeeder-network

networks:
  petfeeder-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  mosquitto-data:
    driver: local
  mosquitto-logs:
    driver: local

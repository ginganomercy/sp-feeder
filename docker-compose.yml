services:
  # Flask Application — image pulled from GHCR by CI/CD
  web:
    image: ${GHCR_IMAGE:-smart-pet-feeder:latest}
    container_name: smart-pet-feeder-web
    restart: unless-stopped
    # Expose ke host agar Nginx di host bisa forward ke 127.0.0.1:5011
    ports:
      - "5011:5011"
    env_file:
      - .env.docker
    environment:
      # Pakai HiveMQ public broker (sama dengan firmware ESP32)
      - MQTT_BROKER=broker.hivemq.com
      - MQTT_PORT=8883
    depends_on:
      db:
        condition: service_healthy
    networks:
      - petfeeder-network
    volumes:
      - logs-data:/app/logs
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5011/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: smart-pet-feeder-db
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      MYSQL_DATABASE: smart_pet_feeder
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - petfeeder-network
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent 2>/dev/null || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

networks:
  petfeeder-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  logs-data:
    driver: local

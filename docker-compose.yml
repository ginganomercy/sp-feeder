services:
  # Flask Application — image pulled from GHCR by CI/CD
  web:
    image: ${GHCR_IMAGE:-smart-pet-feeder:latest}
    container_name: smart-pet-feeder-web
    restart: unless-stopped
    ports:
      - "5011:5011"
    env_file:
      - .env.docker
    environment:
      # Override .env.docker: internal Docker pakai plain 1883, bukan TLS 8883
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
    depends_on:
      db:
        condition: service_healthy
    networks:
      - petfeeder-network
    volumes:
      - logs-data:/app/logs
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5011/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: smart-pet-feeder-db
    restart: unless-stopped
    # env_file passes MYSQL_ROOT_PASSWORD, MYSQL_USER, MYSQL_PASSWORD
    env_file:
      - .env.docker
    # MySQL image needs MYSQL_DATABASE (bukan MYSQL_DB) untuk inisialisasi DB
    environment:
      MYSQL_DATABASE: smart_pet_feeder
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - petfeeder-network
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent 2>/dev/null || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # Mosquitto MQTT Broker (Private)
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: smart-pet-feeder-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker/mosquitto/config:/mosquitto/config:ro
      - mosquitto-data:/mosquitto/data
    networks:
      - petfeeder-network

networks:
  petfeeder-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  mosquitto-data:
    driver: local
  logs-data:
    driver: local

name: Deploy Smart Pet Feeder

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/smart-pet-feeder

jobs:
  # ─────────────────────────────────────────────────────
  # JOB 0: Lint Web App
  # ─────────────────────────────────────────────────────
  lint:
    name: Lint Web App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check . --output-format=github

  # ─────────────────────────────────────────────────────
  # JOB 1: Build & push Docker image to GHCR
  # ─────────────────────────────────────────────────────
  build:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}


    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ─────────────────────────────────────────────────────
  # JOB 2: Deploy to server via Tailscale + SSH
  # ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Sync docker-compose to server
        run: |
          rsync -avz \
            docker-compose.yml docker/mysql \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/

      - name: Write compose .env on server
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "echo 'GHCR_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest' > ${{ secrets.DEPLOY_PATH }}/.env"

      - name: Pull image & restart containers
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash << 'SSHEOF'
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH }}

            echo "🔐 Logging in to GHCR..."
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "📥 Pulling latest image..."
            docker compose pull web

            echo "🔄 Restarting containers..."
            docker compose down --remove-orphans || true
            docker compose up -d

            echo "📋 Container status:"
            docker compose ps

            echo "🧹 Pruning old images..."
            docker image prune -af --filter "until=24h" || true
          SSHEOF

      - name: Health check (retry up to 5 min)
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash << 'EOF'
            echo "⏳ Waiting for app to be ready..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:5011/ > /dev/null 2>&1; then
                echo "✅ Healthy after ${i}x10s = $((i*10))s"
                exit 0
              fi
              echo "  Attempt $i/30 — not ready yet, waiting 10s..."
              sleep 10
            done
            echo "❌ Health check failed after 5 minutes!"
            echo "--- Container status ---"
            docker compose -f ${{ secrets.DEPLOY_PATH }}/docker-compose.yml ps
            echo "--- Web logs (last 50) ---"
            docker compose -f ${{ secrets.DEPLOY_PATH }}/docker-compose.yml logs web --tail 50
            echo "--- DB logs (last 20) ---"
            docker compose -f ${{ secrets.DEPLOY_PATH }}/docker-compose.yml logs db --tail 20
            exit 1
          EOF

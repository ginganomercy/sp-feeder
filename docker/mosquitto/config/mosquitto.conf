# Mosquitto Configuration for Smart Pet Feeder
# Private MQTT Broker

# ============================================
# Listener Configuration
# ============================================

# Default listener for local network
listener 1883
protocol mqtt

# WebSocket listener (optional, for web clients)
listener 9001
protocol websockets

# ============================================
# Security Configuration
# ============================================

# Allow anonymous connections (change to false for production with auth)
allow_anonymous true

# Uncomment and configure for username/password authentication
# password_file /mosquitto/config/passwd
# allow_anonymous false

# ============================================
# Logging
# ============================================

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# ============================================
# Persistence
# ============================================

persistence true
persistence_location /mosquitto/data/

# ============================================
# Message Settings
# ============================================

# Maximum QoS level allowed
max_qos 2

# Maximum number of messages to hold in queue
max_queued_messages 1000

# Message size limit (bytes)
message_size_limit 0

# ============================================
# Connection Settings
# ============================================

# Maximum number of concurrent connections
max_connections -1

# ============================================
# NOTE: Production Security Hardening
# ============================================
# For production, add:
# 1. Create password file: mosquitto_passwd -c /mosquitto/config/passwd username
# 2. Set allow_anonymous false
# 3. Enable TLS if exposing to internet
